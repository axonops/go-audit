version: 1
app_name: example
host: localhost
outputs:
  console:
    type: stdout

  security_log:
    type: file
    file:
      path: "./security.log"
    route:
      include_categories:
        security: {}

  writes_log:
    type: file
    file:
      path: "./writes.log"
    route:
      include_categories:
        write: {}

  critical_alerts:
    type: file
    file:
      path: "./critical.log"
    route:
      min_severity: 7
