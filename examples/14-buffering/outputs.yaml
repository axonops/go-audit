# Buffering example — demonstrates the two-level buffering architecture.
#
# Level 1 (core queue): the auditor section controls the channel between
# AuditEvent() and the drain goroutine. We set queue_size to 5 to
# trigger ErrQueueFull with a small burst.
#
# Level 2 (per-output buffer): every non-stdout output has its own
# internal buffer. The webhook output has buffer_size: 10 and
# batching (batch_size: 5). We point it at a port with nothing
# listening — writes fail, the buffer fills, and events are dropped
# with OutputMetrics.RecordDrop().
#
# The file output also has an internal async buffer (default 10,000).
# It writes one event at a time from its own writeLoop goroutine.
#
# In production, use the defaults (auditor queue_size: 10000,
# shutdown_timeout: 5s, per-output buffer_size: 10000, batch_size: 100).

version: 1
app_name: "buffering-example"
host: "localhost"

auditor:
  queue_size: 5            # Tiny core queue to demonstrate ErrQueueFull.
  shutdown_timeout: "2s"   # Short shutdown for fast shutdown.

outputs:
  # Async file output — has its own internal buffer and writeLoop goroutine.
  audit_file:
    type: file
    file:
      path: "./audit-buffering-demo.log"
      max_size_mb: 1
      max_backups: 0
      max_age_days: 0

  # Async webhook output — has its own internal buffer and batch goroutine.
  # Points at a port with nothing listening to demonstrate Level 2 drops.
  webhook_demo:
    type: webhook
    webhook:
      url: "http://localhost:19999/audit"
      allow_insecure_http: true
      allow_private_ranges: true
      buffer_size: 10          # Tiny Level 2 buffer for demo.
      batch_size: 5            # Small batch — flush after 5 events.
      flush_interval: "1s"     # Fast flush for demo.
      timeout: "1s"            # Short timeout so failures resolve quickly.
      max_retries: 1           # Minimal retries for demo.
