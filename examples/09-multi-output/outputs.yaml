version: 1
app_name: example
host: localhost
outputs:
  console:
    type: stdout

  audit_log:
    type: file
    file:
      path: "./audit.log"

  # Disabled outputs are skipped at load time — the output is not
  # created and receives no events. Use this to temporarily turn off
  # an output without removing its config block. Flip to true (or
  # remove the line) to re-enable.
  debug_file:
    enabled: false
    type: file
    file:
      path: "./debug.log"
