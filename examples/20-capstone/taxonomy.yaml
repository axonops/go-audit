version: 1

sensitivity:
  labels:
    pii:
      description: "Personally identifiable information"
      fields: [email, phone, address]
    financial:
      description: "Financial and payment data"
      fields: [credit_card, bank_account]

categories:
  security:
    severity: 8
    events:
      - auth_success
      - auth_failure
      - auth_logout
      - token_expired
      - rate_limit_exceeded
      - authorization_failure
  write:
    severity: 5
    events:
      - user_create
      - user_update
      - user_delete
      - item_create
      - item_update
      - item_delete
      - order_create
      - order_update
      - config_change
  read:
    severity: 3
    events:
      - user_list
      - user_read
      - item_list
      - item_read
      - order_list
      - order_read
  lifecycle:
    severity: 7
    events:
      - app_startup
      - app_shutdown
  compliance:
    severity: 9
    events:
      - data_export
      - bulk_delete

events:
  # --- Security events ---
  auth_success:
    description: "An authentication attempt succeeded"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  auth_failure:
    description: "An authentication attempt failed"
    severity: 9
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  auth_logout:
    description: "A user logged out"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  token_expired:
    description: "An expired session token was presented"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  rate_limit_exceeded:
    description: "Too many failed authentication attempts"
    severity: 9
    fields:
      outcome: { required: true }

  authorization_failure:
    description: "A request was denied due to insufficient permissions"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  # --- Write events ---
  user_create:
    description: "A new user account was created"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      email: { labels: [pii] }
      phone: { labels: [pii] }

  user_update:
    description: "A user account was updated"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      email: { labels: [pii] }
      phone: { labels: [pii] }

  user_delete:
    description: "A user account was deleted"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  item_create:
    description: "An inventory item was created"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      quantity: { type: int }
      unit_price: { type: float64 }
      in_stock: { type: bool }

  item_update:
    description: "An inventory item was updated"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      quantity: { type: int }
      unit_price: { type: float64 }

  item_delete:
    description: "An inventory item was deleted"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  order_create:
    description: "An order was placed"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  order_update:
    description: "An order was updated"
    fields:
      outcome: { required: true }
      actor_id: { required: true }

  config_change:
    description: "An application setting was changed"
    severity: 7
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      setting_key: {}
      old_value: {}
      new_value: {}

  # --- Read events ---
  user_list:
    description: "User accounts were listed"
    fields:
      outcome: { required: true }

  user_read:
    description: "A user account was viewed"
    fields:
      outcome: { required: true }

  item_list:
    description: "Inventory items were listed"
    fields:
      outcome: { required: true }

  item_read:
    description: "An inventory item was viewed"
    fields:
      outcome: { required: true }

  order_list:
    description: "Orders were listed"
    fields:
      outcome: { required: true }

  order_read:
    description: "An order was viewed"
    fields:
      outcome: { required: true }

  # --- Lifecycle events ---
  app_startup:
    description: "Application started and audit pipeline is ready"
    fields:
      outcome: { required: true }

  app_shutdown:
    description: "Application is shutting down gracefully"
    fields:
      outcome: { required: true }

  # --- Compliance events ---
  data_export:
    description: "User data was exported for compliance"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      record_count: {}

  bulk_delete:
    description: "A bulk deletion was performed"
    fields:
      outcome: { required: true }
      actor_id: { required: true }
      affected_count: {}
