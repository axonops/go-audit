# Inventory Demo Capstone — 4-output fan-out topology
#
# Every audit event flows through all four outputs simultaneously.
# Each output demonstrates a different audit feature combination:
#
#   stdout        → JSON, all events, full PII      (developer debugging)
#   audit.log     → CEF, all events, HMAC v1        (compliance archive)
#   security.log  → JSON, security only, HMAC v2    (security team feed)
#   Loki          → JSON, all events, PII stripped   (Grafana dashboards)

version: 1
app_name: "inventory-demo"
host: "${HOSTNAME:-localhost}"

# Secret providers — configured declaratively.
# Tokens come from environment variables; no secrets in config files.
# Providers are constructed, used for ref+ URI resolution, and closed
# within outputconfig.Load().
secrets:
  timeout: "15s"
  openbao:
    address: "${BAO_ADDR}"
    token: "${BAO_TOKEN}"
    allow_insecure_http: true    # Dev-only — NEVER in production
    allow_private_ranges: true   # Docker internal network

auditor:
  queue_size: ${AUDIT_QUEUE_SIZE:-10000}
  shutdown_timeout: "${AUDIT_SHUTDOWN_TIMEOUT:-5s}"

outputs:
  # 1. Developer debugging — all events, full PII, no HMAC.
  #    Visible via `docker compose logs app` or `go run .`
  console:
    type: stdout

  # 2. Compliance archive — CEF format for SIEM ingestion.
  #    HMAC v1 (SHA-256) for tamper detection.
  #    All events, full PII retained for regulatory retention.
  compliance_archive:
    type: file
    file:
      path: "${AUDIT_LOG_PATH:-./audit.log}"
      max_size_mb: 100
      max_backups: 5
      max_age_days: 90
    formatter:
      type: cef
      vendor: "AxonOps"
      product: "InventoryAPI"
      version: "1.0"
    hmac:
      enabled: "ref+openbao://secret/data/audit/hmac-v1#enabled"
      salt:
        version: "ref+openbao://secret/data/audit/hmac-v1#version"
        value: "ref+openbao://secret/data/audit/hmac-v1#salt"
      algorithm: "ref+openbao://secret/data/audit/hmac-v1#hash"

  # 3. Security team feed — JSON, security category only, severity >= 7.
  #    HMAC v2 (SHA-512) with a DIFFERENT salt to prove per-output
  #    HMAC isolation. Only security and compliance category events:
  #    auth_failure, auth_success, auth_logout, token_expired,
  #    rate_limit_exceeded, authorization_failure, data_export,
  #    bulk_delete.
  security_feed:
    type: file
    file:
      path: "${SECURITY_LOG_PATH:-./security.log}"
      max_size_mb: 50
      max_backups: 5
      max_age_days: 90
    route:
      include_categories:
        - security
        - compliance
      min_severity: 7
    hmac:
      enabled: "ref+openbao://secret/data/audit/hmac-v2#enabled"
      salt:
        version: "ref+openbao://secret/data/audit/hmac-v2#version"
        value: "ref+openbao://secret/data/audit/hmac-v2#salt"
      algorithm: "ref+openbao://secret/data/audit/hmac-v2#hash"

  # 4. Operational monitoring — Loki with Grafana dashboards.
  #    PII fields (email, phone, address) are STRIPPED before delivery.
  #    All events included for full operational visibility.
  loki_dashboard:
    type: loki
    loki:
      # Use http://localhost:3100/... when running outside Docker (go run .)
      # Use http://loki:3100/... when running inside Docker Compose
      url: "${LOKI_URL:-http://localhost:3100/loki/api/v1/push}"
      tenant_id: "inventory-demo"
      allow_insecure_http: true    # Dev-only — NEVER in production; use HTTPS
      allow_private_ranges: true  # Dev-only — NEVER in production; enables SSRF
      batch_size: 50
      flush_interval: "1s"
      timeout: "5s"
      gzip: true
      labels:
        static:
          job: "inventory-demo-audit"
        dynamic:
          event_type: true
          event_category: true
          severity: true
    exclude_labels:
      - pii
      - financial
