# Syslog output configuration for the audit example.
#
# This sends audit events to a local TCP syslog receiver as RFC 5424
# messages. The example embeds a TCP server that listens on port 1514.
#
# For a real deployment, replace the address with your syslog server
# (e.g., rsyslog, syslog-ng, Splunk, or your SIEM's syslog endpoint).

version: 1

app_name: "syslog-example"
host: "dev-machine"

outputs:
  siem:
    type: syslog
    syslog:
      network: "tcp"                   # "tcp" (default), "udp", or "tcp+tls"
      address: "localhost:1514"        # host:port of the syslog server
      app_name: "audit-example"        # RFC 5424 APP-NAME header field
      facility: "local0"              # syslog facility (default: "local0")
      max_retries: 3                   # reconnection attempts (default: 10)
      # For TLS (uncomment for production):
      # network: "tcp+tls"
      # tls_ca: "/etc/audit/ca.pem"
      # tls_cert: "/etc/audit/client.pem"
      # tls_key: "/etc/audit/client-key.pem"
      # tls_policy:
      #   allow_tls12: false           # TLS 1.3 only (default)
