version: 1

categories:
  security:
    - auth_login
    - auth_failure
  write:
    - user_create
    - data_export

events:
  auth_login:
    description: "User authenticated successfully"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
  auth_failure:
    description: "Authentication attempt failed"
    severity: 8
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      reason:
        required: true
  user_create:
    description: "A new user account was created"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
  data_export:
    description: "Data was exported from the system"
    severity: 7
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      format:
        required: true
      row_count:
        required: true
