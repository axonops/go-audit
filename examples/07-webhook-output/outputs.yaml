# Webhook output configuration for the audit example.
#
# This sends audit events as NDJSON batches to an HTTP endpoint.
# The example embeds a local HTTP server that receives and prints
# the batches — no external webhook receiver needed.
#
# In production, replace the URL with your alerting endpoint,
# log aggregator, or custom webhook receiver.

version: 1

app_name: "webhook-example"
host: "dev-machine"

outputs:
  alerts:
    type: webhook
    webhook:
      url: "http://localhost:9090/audit"   # local dev server
      batch_size: 10                       # flush after 10 events (default: 100)
      flush_interval: "1s"                 # or flush after 1 second
      timeout: "5s"                        # HTTP request timeout
      max_retries: 2                       # retry on 5xx/429 (default: 3)
      allow_insecure_http: true            # local dev only — use https in production
      allow_private_ranges: true           # local dev only — SSRF protection off
      headers:                             # custom HTTP headers
        X-Audit-Source: "webhook-example"
        X-Custom-Token: "demo-token-123"
      # For production with HTTPS + auth:
      # url: "https://ingest.example.com/audit"
      # headers:
      #   Authorization: "Bearer ${WEBHOOK_TOKEN}"
      # tls_ca: "/etc/audit/ca.pem"
      # tls_cert: "/etc/audit/client.pem"
      # tls_key: "/etc/audit/client-key.pem"
