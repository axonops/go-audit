  # audit-gen CLI tool
  - package-ecosystem: "gomod"
    directory: "/cmd/audit-gen"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # audit-validate CLI tool
  - package-ecosystem: "gomod"
    directory: "/cmd/audit-validate"
    schedule:
