  # GitHub Actions — keeps SHA pins current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps):"
    labels:
      - "dependencies"
      - "ci"
