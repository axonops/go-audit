  # Capstone (inventory demo) example
  - package-ecosystem: "gomod"
    directory: "/examples/20-capstone"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    groups:
