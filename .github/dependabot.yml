        update-types:
          - "minor"
          - "patch"

  # bdd-report CI tool (cucumber JSON → HTML/Markdown converter)
  - package-ecosystem: "gomod"
    directory: "/cmd/bdd-report"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
