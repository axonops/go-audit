name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Job dependency chain (fail-fast ordering, post-#759 refactor):
#   changes — detects docs-only PRs; outputs.code = true/false; always runs
#   dependency-review — PR-only, blocks vulnerable-dependency PRs
#   validate-release — always runs (GoReleaser config check)
#   hygiene — always runs (make check-static; fmt/tidy/replace/todos/
#              insecure-skip-verify/example-links/bdd-strict/bench-baseline/
#              license-headers)
#   lint, test x11, cross-build, examples-build,
#   security x13, security-verify    — needs: hygiene
#   integration                      — needs: hygiene
#   bdd x8                            — needs: test
#   bdd-verify                        — needs: bdd
#   test-cross-platform x4 (mac+win)  — needs: test
#   ci-pass                           — needs: every job; allows "skipped"
#                                        results for docs-only PRs

jobs:
  # Detect whether code changed or only docs/markdown changed.
  # Docs-only PRs skip test, build, integration, BDD, and benchmark jobs.
  changes:
    name: Test - Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      mutation-targets: ${{ steps.mutation.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Resolve the diff base shared by both filter steps below.
      # Sets BASE in $GITHUB_ENV plus a sentinel BASE_RESOLVED that
      # downstream steps check before running their own diff.
      #   BASE_RESOLVED=skip       — workflow_dispatch / workflow_call
      #                              (each consumer decides what skip
      #                              means: full-CI for `filter`, empty
      #                              targets for `mutation`).
      #   BASE_RESOLVED=force-full — base unreachable / first push;
      #                              run everything.
      #   BASE_RESOLVED=ok         — BASE is set to a usable commit SHA.
      - name: Resolve diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "BASE_RESOLVED=skip" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "BASE_RESOLVED=force-full" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "BASE_RESOLVED=force-full" >> "$GITHUB_ENV"
            echo "Base commit $BASE not reachable — downstream steps will run full CI"
            exit 0
          fi

          echo "BASE=$BASE" >> "$GITHUB_ENV"
          echo "BASE_RESOLVED=ok" >> "$GITHUB_ENV"

      - name: Check for code changes
        id: filter
        run: |
          # filter treats both `skip` (manual trigger) and `force-full`
          # (unreachable base) as "run full CI" — historical behaviour.
          if [ "$BASE_RESOLVED" != "ok" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if any non-docs files changed.
          # Order: literal files first, then globs, then directories.
          # ':!*.md' matches root-level .md; ':!**/*.md' matches every
          # depth. The two together cover every .md path. Workflow
          # files under .github/workflows/ are intentionally NOT
          # excluded — workflow changes MUST run full CI.
          CHANGED=$(git diff --name-only "$BASE" HEAD -- \
            ':!LICENSE' \
            ':!NOTICE' \
            ':!*.md' \
            ':!**/*.md' \
            ':!**/CHANGELOG*' \
            ':!**/CONTRIBUTING*' \
            ':!.claude/**' \
            ':!docs/**' \
            ':!.github/ISSUE_TEMPLATE/**' \
          )

          if [ -z "$CHANGED" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected — skipping test/build jobs"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected:"
            echo "$CHANGED" | head -20
          fi

      # Detect which mutation-test targets need to run for this PR.
      # Output is a JSON array consumed by the `mutation-test` job's
      # matrix strategy. Empty array → matrix expands to zero jobs and
      # the gate trivially passes (no surviving-mutant risk introduced).
      #
      # A target runs when EITHER its source file OR its test file
      # changes — a test refactor that drops an `errors.Is` check is
      # exactly the regression mutation testing is designed to catch.
      # `.gremlins.yaml` changing forces all 6 targets to run since
      # config affects every per-file invocation. (#524)
      - name: Detect mutation-test targets
        id: mutation
        run: |
          # mutation treats `skip` and `force-full` as "no targets" —
          # the standalone mutation-test workflow handles full-suite
          # runs explicitly, and a first push without a reachable base
          # is covered by the next weekly scheduled run.
          if [ "$BASE_RESOLVED" != "ok" ]; then
            echo 'targets=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(git diff --name-only "$BASE" HEAD)

          # If .gremlins.yaml changed, every target must re-run because
          # operator/threshold config affects every file equally.
          if echo "$DIFF" | grep -q '^\.gremlins\.yaml$'; then
            echo 'targets=["validate_fields","validate_taxonomy","hmac","filter","format_cef","sensitivity"]' >> "$GITHUB_OUTPUT"
            echo ".gremlins.yaml changed — running all 6 mutation targets"
            exit 0
          fi

          # Otherwise, run a target if its source OR test file changed.
          # Test-file suffixes covered: _test, _boundary_test,
          # _property_test, _internal_test.
          declare -a TARGETS=()
          for t in validate_fields validate_taxonomy hmac filter format_cef sensitivity; do
            if echo "$DIFF" | grep -qE "^${t}(_(boundary|property|internal))?(_test)?\.go$"; then
              TARGETS+=("\"${t}\"")
            fi
          done

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo 'targets=[]' >> "$GITHUB_OUTPUT"
            echo "No mutation-test targets affected by this PR"
          else
            JSON="[$(IFS=,; echo "${TARGETS[*]}")]"
            echo "targets=${JSON}" >> "$GITHUB_OUTPUT"
            echo "Mutation-test targets: ${JSON}"
          fi

  # PR-only supply-chain guard. `actions/dependency-review-action`
  # diffs the PR's go.mod / go.sum changes against the GitHub
  # Advisory Database (GHAS) and fails the check if the diff
  # introduces a HIGH-severity advisory in any added or upgraded
  # module. It complements `make security` (govulncheck × every
  # published module — see the `security:` matrix below): govulncheck
  # tracks Go-vuln-DB CVEs that are reachable from imported symbols
  # in the existing tree, while this job catches GHAS advisories on
  # new or bumped modules at PR time, often before the Go vuln DB
  # has indexed them. It is also the only check that can enforce
  # license-policy or supply-chain blocklists if we ever configure
  # `deny-licenses` / `deny-packages`.
  #
  # Deliberately NOT in `ci-pass.needs:` (see comment on `ci-pass`
  # below) — the job is `if: github.event_name == 'pull_request'`
  # and would otherwise mark every push run as `skipped`. Removing
  # this job would not weaken the merge gate, but would lose the
  # only PR-time GHAS coverage and the only license-policy hook.
  #
  # Requires Dependency Graph enabled in repo settings:
  # https://github.com/axonops/audit/settings/security_analysis
  dependency-review:
    name: Test - Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # action posts a PR comment on findings
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  hygiene:
    name: Test - Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          install-tools: 'true'

      # Run every static-analysis guard in one shot, with
      # error collection so all failures surface on a single
      # push instead of aborting on the first. Mirrors `make
      # check-static` which developers also run locally.
      # Replaces 8 individual `run: make ...` steps that
      # previously each ran in serial.
      #
      # On a `release/v*` branch (the auto-opened release PR),
      # `tidy-check` is skipped: update-deps.sh pins go.mods to
      # the new version BEFORE the tag exists on origin, so a
      # workspace-mode `go mod tidy` would write pseudo-version
      # hashes that don't match the (future) tag's tarball. The
      # release flow restores tidy correctness post-tag.
      - name: Run static-analysis checks
        env:
          SKIP_TIDY_CHECK: ${{ (startsWith(github.head_ref, 'release/') || startsWith(github.ref_name, 'release/')) && '1' || '' }}
        run: make check-static

  lint:
    name: Test - Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          install-tools: 'true'

      - name: Run go vet
        run: make vet-all

      - name: Run golangci-lint
        run: make lint-all

  validate-release:
    name: Test - Validate GoReleaser Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          args: check

  test:
    name: Test - Unit (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        include:
          - module: "."
            target: test-core
            flag: core
          - module: file
            target: test-file
            flag: file
          - module: syslog
            target: test-syslog
            flag: syslog
          - module: webhook
            target: test-webhook
            flag: webhook
          - module: loki
            target: test-loki
            flag: loki
          - module: splunk
            target: test-splunk
            flag: splunk
          - module: outputconfig
            target: test-outputconfig
            flag: outputconfig
          - module: cmd/audit-gen
            target: test-audit-gen
            flag: audit-gen
          - module: cmd/audit-validate
            target: test-audit-validate
            flag: audit-validate
          - module: secrets
            target: test-secrets
            flag: secrets
          - module: secrets/env
            target: test-secrets-env
            flag: secrets-env
          - module: secrets/file
            target: test-secrets-file
            flag: secrets-file
          - module: secrets/openbao
            target: test-secrets-openbao
            flag: secrets-openbao
          - module: secrets/vault
            target: test-secrets-vault
            flag: secrets-vault
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          # gotestsum is required when JUNIT_REPORT_FILE is set on
          # the test step below (PR A foundation, #877).
          install-tools: 'true'

      - name: Run unit tests with coverage
        env:
          JUNIT_REPORT_FILE: ${{ runner.temp }}/junit-${{ matrix.flag }}.xml
        run: make ${{ matrix.target }}

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.flag }}
          fail_ci_if_error: false

      - name: Generate + upload Unit test report
        if: always()
        uses: ./.github/actions/upload-test-report
        with:
          format: junit-xml
          suite: ${{ matrix.flag }}
          input-path: ${{ runner.temp }}/junit-${{ matrix.flag }}.xml
          artifact-prefix: test-report-unit

  # Cross-platform test matrix for core + file. Runs only after the
  # Linux test and BDD jobs pass, so a Linux-side bug fails fast
  # without burning macOS-priced minutes (10× Linux) or Windows
  # runner time. macOS catches POSIX-but-different (symlink path
  # canonicalisation, file system semantics); Windows catches
  # POSIX-incompatible (permission model, file locking, timer
  # resolution).
  test-cross-platform:
    name: Test - Cross-Platform (${{ matrix.module }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 15
    needs: [test, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: "."
            target: test-core
            flag: core
            os: macos-latest
          - module: "."
            target: test-core
            flag: core
            os: windows-latest
          - module: file
            target: test-file
            flag: file
            os: macos-latest
          - module: file
            target: test-file
            flag: file
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          install-make-on-windows: 'true'
          # Required so the test recipes can find gotestsum when PR B
          # (#877) wires JUNIT_REPORT_FILE for cross-platform artefacts.
          # See `BINEXT` handling in the Makefile for Windows .exe.
          install-tools: 'true'

      - name: Run unit tests with coverage
        shell: bash
        env:
          JUNIT_REPORT_FILE: ${{ runner.temp }}/junit-${{ matrix.flag }}-${{ matrix.os }}.xml
        run: make ${{ matrix.target }}

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.flag }}-${{ matrix.os }}
          fail_ci_if_error: false

      - name: Generate + upload Cross-Platform test report
        if: always()
        uses: ./.github/actions/upload-test-report
        with:
          format: junit-xml
          # `<flag>-<os>` so the macOS and Windows artifacts for the
          # same module don't collide.
          suite: ${{ matrix.flag }}-${{ matrix.os }}
          input-path: ${{ runner.temp }}/junit-${{ matrix.flag }}-${{ matrix.os }}.xml
          artifact-prefix: test-report-crossplatform

  integration:
    name: Test - Integration (${{ matrix.flag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      # One per-module leg can fail without masking the others — the
      # previous single-recipe shape aborted on the first failure and
      # hid subsequent module results.
      fail-fast: false
      matrix:
        include:
          - module: "."
            target: test-integration-core
            flag: integration-core
            # Core integration covers tests/integration/e2e_secrets_webhook_test.go
            # (needs openbao + webhook) and fanout_test.go (needs
            # syslog + webhook + loki). Spin the full stack — narrowing
            # to a per-test-file subset is a future optimisation.
            infra-up: test-infra-up
            infra-down: test-infra-down
          - module: file
            target: test-integration-file
            flag: integration-file
            infra-up: ""
            infra-down: ""
          - module: syslog
            target: test-integration-syslog
            flag: integration-syslog
            infra-up: test-infra-syslog-up
            infra-down: test-infra-syslog-down
          - module: webhook
            target: test-integration-webhook
            flag: integration-webhook
            infra-up: test-infra-webhook-up
            infra-down: test-infra-webhook-down
          - module: loki
            target: test-integration-loki
            flag: integration-loki
            infra-up: test-infra-loki-up
            infra-down: test-infra-loki-down
          - module: secrets/openbao
            target: test-integration-secrets-openbao
            flag: integration-openbao
            infra-up: test-infra-openbao-up
            infra-down: test-infra-openbao-down
          - module: secrets/vault
            target: test-integration-secrets-vault
            flag: integration-vault
            infra-up: test-infra-vault-up
            infra-down: test-infra-vault-down
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          # gotestsum is required when JUNIT_REPORT_FILE is set
          # (PR A foundation, #877).
          install-tools: 'true'

      - name: Start test infrastructure
        if: matrix.infra-up != ''
        # matrix.infra-up may name multiple targets separated by spaces.
        # Direct interpolation word-splits naturally; the matrix values
        # are a repo-controlled closed set so no injection surface.
        run: make ${{ matrix.infra-up }}

      - name: Run integration tests
        env:
          JUNIT_REPORT_FILE: ${{ runner.temp }}/junit-${{ matrix.flag }}.xml
        run: make ${{ matrix.target }}

      - name: Generate + upload Integration test report
        if: always()
        uses: ./.github/actions/upload-test-report
        with:
          format: junit-xml
          suite: ${{ matrix.flag }}
          input-path: ${{ runner.temp }}/junit-${{ matrix.flag }}.xml
          artifact-prefix: test-report-integration

      - name: Stop test infrastructure
        if: always() && matrix.infra-down != ''
        run: make ${{ matrix.infra-down }}

  bdd:
    name: Test - BDD (${{ matrix.suite }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: ${{ matrix.timeout }}
    needs: [test, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core scenarios: no Docker required
          - suite: core
            target: test-bdd-core
            infra-up: ""
            infra-down: ""
            timeout: 8
          # Output config BDD: no Docker required
          - suite: outputconfig
            target: test-bdd-outputconfig
            infra-up: ""
            infra-down: ""
            timeout: 5
          # File output: no Docker required (excludes @docker scenarios)
          - suite: file
            target: test-bdd-file
            infra-up: ""
            infra-down: ""
            timeout: 5
          # File output OS-level failure modes (#748): privileged
          # tmpfs container for ENOSPC reproduction.
          - suite: file-os
            target: test-bdd-file-os
            infra-up: test-infra-file-os-up
            infra-down: test-infra-file-os-down
            timeout: 8
          # Syslog: needs syslog-ng container
          - suite: syslog
            target: test-bdd-syslog
            infra-up: test-infra-syslog-up
            infra-down: test-infra-syslog-down
            timeout: 8
          # Webhook + routing: needs webhook-receiver container
          - suite: webhook
            target: test-bdd-webhook
            infra-up: test-infra-webhook-up
            infra-down: test-infra-webhook-down
            timeout: 8
          # Loki (excluding fan-out): needs Loki containers
          - suite: loki
            target: test-bdd-loki
            infra-up: test-infra-loki-up
            infra-down: test-infra-loki-down
            timeout: 10
          # Fan-out: needs all containers (syslog + webhook + loki)
          - suite: fanout
            target: test-bdd-fanout
            infra-up: test-infra-up
            infra-down: test-infra-down
            timeout: 10
          # Secrets: needs OpenBao + Vault containers with dev-tls
          - suite: secrets
            target: test-bdd-secrets
            infra-up: test-infra-openbao-up test-infra-vault-up
            infra-down: test-infra-openbao-down test-infra-vault-down
            timeout: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit

      - name: Start test infrastructure
        if: matrix.infra-up != ''
        run: make ${{ matrix.infra-up }}

      - name: Run BDD tests
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          # godog writes a cucumber JSON report at this path when set.
          # cmd/bdd-report (next steps) converts it to per-suite HTML
          # and Markdown artefacts published below. See #439.
          BDD_REPORT_FILE: ${{ runner.temp }}/bdd-report-${{ matrix.suite }}.json
        run: |
          set -eo pipefail
          make "$TARGET" 2>&1 | tee /tmp/bdd-output.txt

      - name: Extract scenario count
        if: always()
        shell: bash
        env:
          SUITE: ${{ matrix.suite }}
        run: |
          set -eo pipefail
          # Count executed scenarios from go test -v subtest output.
          # Each scenario becomes a "--- PASS: Test*Features/..." or "--- FAIL: Test*Features/..." line.
          # Match both TestFeatures (main suite) and TestOutputConfigFeatures (outputconfig suite).
          if [ -f /tmp/bdd-output.txt ]; then
            count=$(grep -cE '^\s*--- (PASS|FAIL): Test(OutputConfig)?(Docker)?Features/' /tmp/bdd-output.txt || echo 0)
          else
            count=0
          fi
          echo "$count" > /tmp/bdd-count.txt
          echo "BDD suite '$SUITE' executed $count scenarios"

      - name: Upload scenario count
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bdd-count-${{ matrix.suite }}
          path: /tmp/bdd-count.txt
          retention-days: 1

      - name: Generate + upload BDD report
        if: always()
        uses: ./.github/actions/upload-test-report
        with:
          format: cucumber-json
          suite: ${{ matrix.suite }}
          input-path: ${{ runner.temp }}/bdd-report-${{ matrix.suite }}.json
          # Artifact names preserved as bdd-report-<suite> and
          # bdd-report-<suite>-md (back-compat with #876's published names).
          artifact-prefix: bdd-report

      - name: Stop test infrastructure
        if: always() && matrix.infra-down != ''
        # matrix.infra-down may name multiple targets separated by
        # spaces (e.g. the secrets suite needs both openbao + vault
        # teardown). Use direct interpolation — quoting through an
        # env var collapses the two targets into a single literal
        # `make` argument that has no matching rule. The matrix
        # values are repo-controlled (closed set), so direct
        # interpolation is safe.
        run: make ${{ matrix.infra-down }}

  bdd-verify:
    name: Test - BDD Coverage Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: [bdd, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Static tag coverage check
        run: make test-bdd-verify

      - name: Download all scenario counts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bdd-count-*
          path: /tmp/bdd-counts

      - name: Verify executed scenario totals
        shell: bash
        run: |
          ./scripts/verify-bdd-counts.sh /tmp/bdd-counts \
            tests/bdd/features outputconfig/tests/bdd/features

  security:
    name: Test - Security (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      # Fail-fast=false so one vulnerable module does not cancel
      # the scan for the other 11 — operators want to see the
      # full matrix of findings, not just the first one.
      fail-fast: false
      matrix:
        # Keep this list in sync with $(MODULES) in Makefile.
        module:
          - "."
          - file
          - iouring
          - syslog
          - webhook
          - loki
          - splunk
          - outputconfig
          - outputs
          - cmd/audit-gen
          - cmd/audit-validate
          - cmd/bdd-report
          - cmd/junit-report
          - secrets
          - secrets/env
          - secrets/file
          - secrets/openbao
          - secrets/vault
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit

      - name: Install govulncheck only
        run: make install-govulncheck

      - name: Run govulncheck for ${{ matrix.module }}
        run: make security-one MOD=${{ matrix.module }}

  security-verify:
    # Companion job that runs the cross-module module-hygiene
    # check. Kept out of the Security Scan matrix because it
    # operates on the workspace as a whole, not per-module.
    name: Test - Security Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit

      - name: Verify go.sum integrity
        run: make verify

  cross-build:
    name: Test - Cross-Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit

      - name: Build all platforms
        run: make build-all

  examples-build:
    name: Test - Build Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit

      - name: Build all examples
        run: make test-examples

  # PR-scope mutation testing (#524). Matrix-fan-out across the six
  # mutation targets, but ONLY for the targets actually affected by
  # this PR (per `changes.outputs.mutation-targets` — see the change
  # detection job above). The matrix expands to zero jobs when no
  # target source/test file changed; the job result is then "skipped",
  # which the ci-pass aggregate treats as success.
  #
  # Full-suite mutation testing runs weekly via `mutation-test.yml`
  # and on every release tag via `release.yml`; this PR-scope job
  # gates the common case (regression in one file's tests) cheaply.
  mutation-test:
    name: Test - Mutation (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 60 min budget per target — local wall time is ~10 min per file
    # on Ryzen 9 32-thread; ubuntu-latest 4-core runners are 2-3x
    # slower (~20-30 min), with headroom for the gather-coverage
    # warm-up and tool install.
    timeout-minutes: 60
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.mutation-targets != '[]'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.mutation-targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          install-tools: 'true'

      - name: Run mutation-test for ${{ matrix.target }}
        run: |
          set -o pipefail
          # Recipe naming: target stems map 1:1 to make targets — e.g.
          # `format_cef` -> `mutation-test-format-cef`. Hyphenate the
          # underscore tail per CLI naming convention applied in the
          # Makefile (`mutation-test-format-cef`).
          NAME=$(echo '${{ matrix.target }}' | tr '_' '-')
          make "mutation-test-${NAME}" 2>&1 | tee mutation-test-report-${{ matrix.target }}.txt

      - name: Upload mutation-test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Renamed mutation-test-report-* → test-report-mutation-* for
          # naming consistency with the per-test-type test-report-*
          # artefact pattern introduced by #877.
          name: test-report-mutation-${{ matrix.target }}-${{ github.sha }}
          path: mutation-test-report-${{ matrix.target }}.txt
          retention-days: 7

  # Benchmarks removed from CI — GitHub Actions runners have inconsistent
  # performance, making results unreliable for comparison. Run benchmarks
  # locally on consistent hardware: make bench && make bench-compare

  # Aggregate gate: every job above must succeed (or skip cleanly for a
  # docs-only PR) for ci-pass to go green. Branch-protection should
  # require this single check rather than enumerating every job by
  # name.
  #
  # MAINTENANCE NOTE — when adding a new job to this workflow:
  #   1. Add the job name to the `needs:` list below.
  #   2. If the new job has its own `if: needs.changes.outputs.code
  #      == 'true'` (i.e. it is skipped on docs-only PRs), the
  #      `contains(needs.*.result, 'failure')` logic below will
  #      treat its `skipped` result as success — correct.
  #   3. If the new job runs unconditionally, ensure its own steps
  #      honour the docs-only path or update the changes-filter.
  #
  # `dependency-review` is deliberately NOT in `needs:` — it has
  # `if: github.event_name == 'pull_request'` so on push events it
  # would always be `skipped`, which is fine but adds noise.
  ci-pass:
    name: Test - CI Pass
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: [changes, hygiene, lint, test, test-cross-platform, integration, bdd, bdd-verify, security, security-verify, cross-build, examples-build, validate-release, mutation-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # Docs-only PRs skip test/build jobs (result = "skipped").
          # Only "failure" and "cancelled" are errors.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed (skipped jobs are OK for docs-only changes)"
