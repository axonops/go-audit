# Builds binaries, creates the GitHub Release, and attests build
# provenance for all artifacts (supply chain verification via
# `gh attestation verify`). SBOMs are not published — see #514 and
# `docs/releasing.md` "Software Bill of Materials" for the rationale.
#
# This workflow is for MANUAL RE-RUNS ONLY — the normal release flow
# runs GoReleaser as a job inside release.yml.
# Trigger manually on a v* tag ref if the goreleaser job in release.yml failed.
name: GoReleaser

on:
  workflow_dispatch: {}

permissions:
  contents: read

# Shared concurrency group with release.yml (#516 devops review).
# release.yml uses `release-${{ inputs.version || github.ref_name }}`
# at the workflow level. The goreleaser.yml manual-rerun trigger
# matches the same group so both workflows queue behind one another
# rather than racing on the same GitHub Release / Sigstore identity.
# cancel-in-progress: false so a manual rerun queues behind an
# automated tag run rather than killing it mid-flight.
concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref_type == 'tag'
    permissions:
      contents: write
      id-token: write      # required for attestation OIDC
      attestations: write   # required for attestation upload
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: tag must point to a commit on main"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      # Sigstore keyless signing (#516). Installs cosign for the
      # GoReleaser `signs:` stanza. Pinned to v4.1.1 commit SHA.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: 'v2.15.4'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # SBOM publishing intentionally removed (#514). Build provenance
          # attestations cover the binary distribution artifacts directly.
          # Cosign signature artifacts (#516) are also attested so the
          # build-provenance chain covers the signing material itself.
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
