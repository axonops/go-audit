# End-to-end release workflow for axonops/audit (#513).
#
# Replaces the legacy three-tier dance with a single linear flow that
# tags every published module at the SAME merge commit. Two entry
# points:
#
#   workflow_dispatch (primary path)
#     - Runs full CI gate, fuzz-long, advisory bench, advisory api-check
#     - Opens a release PR via the axonops-audit-release-bot GitHub App
#     - Waits (polling) for PR auto-merge through normal branch
#       protection — this is what makes branch protection real
#     - Tags every published module at the merge SHA
#     - Hands off to GoReleaser for binaries + provenance
#     - Verifies proxy + smoke-tests, runs invariants check
#
#   push: tags: v* (recovery path)
#     - Skips CI / PR / wait-for-merge
#     - Runs tag-all idempotently (existing tags at the same SHA are
#       no-ops; tags at a DIFFERENT SHA are aborted as a contamination)
#     - Runs GoReleaser + verify + invariants
#
# All write operations use a token minted from the axonops-audit-release-bot
# GitHub App at job start (1-hour TTL; per-job mints). The legacy
# RELEASE_TOKEN PAT is retired (see CHANGELOG #513). Each job that
# does git pushes uses persist-credentials:false on checkouts that
# don't need the token kept in .git/config beyond the step.
#
# See: docs/releasing.md
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.1.12)"
        required: true
        type: string
      api_check_blocking:
        description: "Treat make api-check as blocking (set true after v1.0)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Serialise per-version. Different versions can run in parallel; the
# same version cannot. A workflow_dispatch in flight will queue a
# subsequent v* tag-push for the same version.
concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

# Workflow-default permissions: read-only. Jobs widen as needed.
permissions:
  contents: read

# Note: the published-module list lives only in the Makefile's
# PUBLISH_MODULES variable. Workflow steps that need it shell out
# to `make print-publish-modules` rather than re-encoding it.

jobs:
  # =====================================================================
  # Job: preflight
  # =====================================================================
  # Resolves PUBLISH_VERSION from either the workflow_dispatch input
  # or the pushed tag's ref. On the recovery (push) path, also
  # verifies the tag's commit is reachable from main and runs the
  # tag-conflict pre-check in idempotent mode against the tag's SHA.
  # =====================================================================
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      merge_sha: ${{ steps.resolve.outputs.merge_sha }}
      is_dispatch: ${{ steps.resolve.outputs.is_dispatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve PUBLISH_VERSION and merge_sha
        id: resolve
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
            is_dispatch=false
          else
            v="$DISPATCH_VERSION"
            is_dispatch=true
          fi
          if ! [[ "$v" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.\-]+)?$ ]]; then
            echo "::error::Invalid version format: $v (expected vX.Y.Z or vX.Y.Z-pre.N)"
            exit 1
          fi
          echo "Version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "is_dispatch=$is_dispatch" >> "$GITHUB_OUTPUT"
          if [ "$is_dispatch" = "true" ]; then
            # workflow_dispatch path: merge_sha is determined by
            # wait-for-pr-merge later. Emit empty so tag-all can
            # tell which input to use.
            echo "merge_sha=" >> "$GITHUB_OUTPUT"
          else
            # Recovery path: the tag IS the trigger; its SHA is the
            # release commit.
            sha="$GITHUB_SHA"
            echo "Tag-push SHA: $sha"
            echo "merge_sha=$sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag SHA is reachable from main (recovery path only)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag SHA $GITHUB_SHA is not reachable from main."
            echo "::error::Recovery path requires the tag to point at a commit on main."
            exit 1
          fi
          echo "✓ Tag SHA reachable from main."

      - name: Tag-conflict pre-check
        env:
          IS_DISPATCH: ${{ steps.resolve.outputs.is_dispatch }}
          VERSION: ${{ steps.resolve.outputs.version }}
          MERGE_SHA: ${{ steps.resolve.outputs.merge_sha }}
        run: |
          set -euo pipefail
          if [ "$IS_DISPATCH" = "true" ]; then
            # Strict mode: reject if any tag already exists.
            scripts/release/check-tag-conflicts.sh "$VERSION"
          else
            # Recovery path: idempotent — existing tags at the same
            # SHA are fine, mismatched SHA is fatal.
            scripts/release/check-tag-conflicts.sh "$VERSION" "$MERGE_SHA"
          fi

  # =====================================================================
  # Job: ci (workflow_dispatch only)
  # =====================================================================
  # The called ci.yml contains a `dependency-review` job that requests
  # `pull-requests: write` so it can post a PR comment on findings.
  # Even though that job has `if: github.event_name == 'pull_request'`
  # and so won't run on the workflow_dispatch path, GitHub validates
  # the requested permissions BEFORE evaluating the `if`. Without
  # granting `pull-requests: write` here, the entire workflow fails
  # validation with a startup_failure (regression introduced in #631).
  ci:
    name: CI Gate
    needs: [preflight]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/ci.yml

  # =====================================================================
  # Job: fuzz-long (workflow_dispatch only)
  # =====================================================================
  # 5 minutes per fuzz target — release-blocking.
  # =====================================================================
  fuzz-long:
    name: Long Fuzz (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up workspace
        run: make workspace

      - name: Run fuzz-long (300s / target)
        shell: bash
        env:
          FUZZ_TIME: 300s
        run: make fuzz-long

      - name: Upload fuzz crashers on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers
          path: |
            testdata/fuzz/**
            outputconfig/testdata/fuzz/**
            secrets/testdata/fuzz/**
          if-no-files-found: ignore

  # =====================================================================
  # Job: bench-advisory (workflow_dispatch only)
  # =====================================================================
  # Advisory — never blocks (continue-on-error). Posts the benchstat
  # delta to the run summary so the maintainer can eyeball it.
  # =====================================================================
  bench-advisory:
    name: Benchmark Regression (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci]
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install benchstat
        run: make install-benchstat

      - name: Set up workspace
        run: make workspace

      - name: Run benchmarks + compare to baseline
        shell: bash
        env:
          BENCH_COUNT: "3"
        run: |
          set +e
          make bench-compare > bench-compare.txt 2>&1
          rc=$?
          set -e
          {
            echo '## Benchmark regression report (advisory)'
            echo
            echo 'Runner variance on shared GitHub Actions hardware means'
            echo 'the deltas below are indicative, not authoritative. Use'
            echo 'this report as a sanity check, not a gate. See #493.'
            echo
            echo '```'
            cat bench-compare.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::bench-compare exited $rc (advisory — does not block the release)"
          fi
          exit "$rc"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-delta
          path: |
            bench.txt
            bench-compare.txt
          if-no-files-found: ignore

  # =====================================================================
  # Job: mutation-test-release (#524)
  # =====================================================================
  # Full mutation-test suite as a release gate. Runs after preflight
  # alongside the other workflow_dispatch-only gates (ci, fuzz-long,
  # bench-advisory, api-check) and gates `update-deps-pr` (the release
  # PR cannot land if mutation-test efficacy is below threshold).
  #
  # workflow_dispatch ONLY: the push-tag recovery path skips this job
  # under the assumption that the gates already passed on the original
  # workflow_dispatch run that aborted before tag publication. Adding
  # this 4-hour gate to the recovery path would block legitimate
  # tag-republish operations behind a re-run of work that already
  # passed — unacceptable for incident-recovery flows.
  #
  # The report artefact is also re-attached to the published GitHub
  # Release by the `mutation-test-attach` job after goreleaser
  # succeeds (per #524 AC#3).
  # =====================================================================
  mutation-test-release:
    name: Mutation Test (release gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 4-hour budget — full suite is 60 min on local Ryzen 9, expected
    # 90-150 min on 4-core ubuntu-latest with headroom for cold caches.
    timeout-minutes: 240
    needs: [preflight]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up audit workspace
        uses: ./.github/actions/setup-audit
        with:
          install-tools: 'true'

      - name: Run full mutation-test suite
        run: |
          set -o pipefail
          make mutation-test 2>&1 | tee mutation-test-report.txt

      - name: Upload mutation-test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-test-report-release-${{ needs.preflight.outputs.version }}
          path: mutation-test-report.txt
          retention-days: 90

  # =====================================================================
  # Job: api-check (workflow_dispatch only)
  # =====================================================================
  # Runs `make api-check` — gorelease per published module against
  # its most recent SemVer-sorted tag. Pre-v1.0: advisory (workflow
  # input api_check_blocking=false suppresses the failure). After
  # v1.0: blocking (set api_check_blocking=true).
  # =====================================================================
  api-check:
    name: API Check (gorelease)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gorelease (pinned)
        run: |
          set -euo pipefail
          # Parse the pinned pseudo-version from scripts/tool-versions.txt
          # without `eval` — defence in depth in case the file ever
          # gains an unexpected line. Strict format check before use.
          GORELEASE_VER="$(awk -F' *:= *' '/^GORELEASE_VER[[:space:]]/{print $2}' scripts/tool-versions.txt)"
          if ! [[ "$GORELEASE_VER" =~ ^v[0-9].*$ ]]; then
            echo "::error::Invalid GORELEASE_VER from tool-versions.txt: '$GORELEASE_VER'"
            exit 1
          fi
          GOTOOLCHAIN=go1.26.3 go install "golang.org/x/exp/cmd/gorelease@$GORELEASE_VER"

      - name: Run make api-check
        id: check
        continue-on-error: true
        run: make api-check

      - name: Enforce blocking mode
        if: steps.check.outcome == 'failure' && inputs.api_check_blocking
        run: |
          echo "::error::api-check found incompatible changes and api_check_blocking=true."
          exit 1

      - name: Advisory note
        if: steps.check.outcome == 'failure' && !inputs.api_check_blocking
        run: |
          echo "::warning::api-check found incompatible changes (advisory — does not block pre-v1.0)."

  # =====================================================================
  # Job: update-deps-pr (workflow_dispatch only)
  # =====================================================================
  # Mints an App token, creates branch release/<version>, runs the
  # update-deps script to pin every inter-module go.mod, opens a PR
  # with auto-merge enabled. Branch protection is respected — the PR
  # waits for CI green AND any required human approval before merging.
  # =====================================================================
  update-deps-pr:
    name: Open release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, ci, fuzz-long, api-check, mutation-test-release]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read  # job-level — App token grants the writes
    outputs:
      pr_number: ${{ steps.open.outputs.pr_number }}
      branch: ${{ steps.open.outputs.branch }}
    steps:
      - name: Mint release-bot App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2.1.4
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Verify auto-merge is enabled at the repo level
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          # gh pr merge --auto silently no-ops if auto-merge is
          # disabled at the repo level. Catch the misconfiguration
          # here rather than discover it after the workflow times out
          # waiting for a merge that will never happen.
          #
          # `gh repo view --json` does not expose this setting (the
          # GraphQL Repository type has no autoMergeAllowed field).
          # The setting lives on the REST repo object as
          # `allow_auto_merge`, so query the REST API directly.
          allow=$(gh api "/repos/${GITHUB_REPOSITORY}" --jq '.allow_auto_merge')
          if [ "$allow" != "true" ]; then
            echo "::error::Repository setting 'Allow auto-merge' is disabled. Enable it in Settings → General before triggering the release workflow."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run update-deps.sh
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
        run: scripts/release/update-deps.sh "$PUBLISH_VERSION"

      - name: Open release PR with auto-merge
        id: open
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/$PUBLISH_VERSION"

          # Recreate the branch idempotently. A previous failed run
          # may have left both a branch AND an orphaned open PR on it
          # — close the PR first so the audit trail stays coherent
          # before deleting the branch.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Stale branch $BRANCH exists on origin — closing any open PRs and deleting."
            for pr in $(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number'); do
              echo "  closing stale PR #$pr"
              gh pr close "$pr" --delete-branch=false --comment "Superseded by re-run of release workflow."
            done
            git push origin --delete "$BRANCH" || true
          fi

          if git diff --quiet HEAD --; then
            echo "::error::update-deps.sh produced no diff. Inter-module deps already at $PUBLISH_VERSION on main? Aborting."
            exit 1
          fi

          # Stage all changes so gh-graphql-commit.sh can enumerate
          # them via `git status --porcelain`. The script enforces an
          # allowlist (go.mod / go.sum only); anything outside it
          # fails the commit.
          git add -A

          # App-signed commit via createCommitOnBranch (#841). The
          # legacy `git commit + git push` required toggling
          # required_signatures off; the GraphQL mutation signs with
          # the App identity server-side and satisfies the branch
          # protection rule directly.
          scripts/release/gh-graphql-commit.sh \
            --branch "$BRANCH" \
            --message "release: pin inter-module deps to $PUBLISH_VERSION" \
            --auto-create-branch

          # `gh pr create` may emit progress lines before the URL —
          # ask for the PR number directly via --json so we don't have
          # to parse stdout. The URL is reconstructed for logging.
          NUM=$(gh pr create \
            --base main --head "$BRANCH" \
            --title "release: $PUBLISH_VERSION" \
            --body "Automated release PR (#513). Tags every published module at the merge commit. Approve to let auto-merge fire after CI green." \
            | tail -n1 | sed -E 's@.*/([0-9]+)$@\1@')
          if ! [[ "$NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse PR number from gh pr create output."
            exit 1
          fi
          gh pr merge "$NUM" --auto --squash
          PR_URL=$(gh pr view "$NUM" --json url --jq '.url')
          echo "pr_number=$NUM"   >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "::notice::Release PR opened: $PR_URL"

  # =====================================================================
  # Job: wait-for-pr-merge (workflow_dispatch only)
  # =====================================================================
  # Polls the release PR until it merges. Branch protection
  # determines whether a human review is required — if so, the
  # maintainer who triggered the workflow approves the PR; auto-merge
  # then fires. Exponential backoff (30s → 60s → 120s, cap 120s)
  # reduces API churn during long human-review windows.
  # =====================================================================
  wait-for-pr-merge:
    name: Wait for release PR to merge
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs: [update-deps-pr]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      merge_sha: ${{ steps.poll.outputs.merge_sha }}
    steps:
      - name: Mint release-bot App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2.1.4
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Poll PR until merged
        id: poll
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ needs.update-deps-pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          GH_REPO="$GITHUB_REPOSITORY"
          export GH_REPO

          deadline=$(( $(date +%s) + 45*60 ))
          delay=30
          while [ "$(date +%s)" -lt "$deadline" ]; do
            STATE=$(gh pr view "$PR" --json state --jq '.state')
            case "$STATE" in
              MERGED)
                SHA=$(gh pr view "$PR" --json mergeCommit --jq '.mergeCommit.oid')
                MERGED_AT=$(gh pr view "$PR" --json mergedAt --jq '.mergedAt')
                if [ -z "$SHA" ] || [ "$SHA" = "null" ] || [ -z "$MERGED_AT" ] || [ "$MERGED_AT" = "null" ]; then
                  echo "::warning::PR state=MERGED but mergeCommit/mergedAt not yet populated, retrying."
                else
                  echo "merge_sha=$SHA" >> "$GITHUB_OUTPUT"
                  echo "::notice::PR #$PR merged at $SHA"
                  exit 0
                fi
                ;;
              CLOSED)
                echo "::error::Release PR #$PR closed without merging."
                exit 1
                ;;
              OPEN)
                echo "PR state OPEN — sleeping ${delay}s"
                ;;
              *)
                echo "PR state $STATE — sleeping ${delay}s"
                ;;
            esac
            sleep "$delay"
            # Exponential backoff capped at 120s.
            if [ "$delay" -lt 120 ]; then
              delay=$(( delay * 2 ))
              [ "$delay" -gt 120 ] && delay=120
            fi
          done

          {
            echo '## wait-for-pr-merge timed out'
            echo
            echo "PR #$PR did not merge within 45 minutes."
            echo
            echo '### Recovery'
            echo
            echo 'The PR is still open and may auto-merge later. Once it merges, push the core tag at the merge commit to trigger the recovery path:'
            echo
            echo '```bash'
            echo "MERGE_SHA=\$(gh pr view $PR --json mergeCommit --jq '.mergeCommit.oid')"
            echo "git fetch origin"
            echo "git tag -a \"\${VERSION}\" -m \"Release \${VERSION}\" \"\$MERGE_SHA\""
            echo "git push origin \"\${VERSION}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Release PR not merged within 45 min — see job summary for the recovery command."
          exit 1

  # =====================================================================
  # Job: tag-all (both paths)
  # =====================================================================
  # Creates and pushes every published-module tag at the merge SHA.
  # Idempotent: existing tags at the same SHA are no-ops; tags at a
  # different SHA abort with a contamination warning.
  #
  # Runs on BOTH paths:
  #   - workflow_dispatch: merge_sha from wait-for-pr-merge
  #   - push:tag (recovery): merge_sha from preflight ($GITHUB_SHA)
  # The job needs preflight + wait-for-pr-merge with `if: always()`
  # plus result-checks so it runs only when the upstream completed
  # successfully.
  # =====================================================================
  tag-all:
    name: Tag all published modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, wait-for-pr-merge]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.wait-for-pr-merge.result == 'success' || needs.wait-for-pr-merge.result == 'skipped')
    permissions:
      contents: read  # App token grants writes
    outputs:
      merge_sha: ${{ steps.sha.outputs.merge_sha }}
    steps:
      - name: Resolve merge_sha
        id: sha
        env:
          DISPATCH_SHA: ${{ needs.wait-for-pr-merge.outputs.merge_sha }}
          PREFLIGHT_SHA: ${{ needs.preflight.outputs.merge_sha }}
          WAIT_RESULT: ${{ needs.wait-for-pr-merge.result }}
        run: |
          set -euo pipefail
          if [ "$WAIT_RESULT" = "success" ] && [ -n "$DISPATCH_SHA" ]; then
            echo "merge_sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"
            echo "Using dispatch merge SHA: $DISPATCH_SHA"
          else
            if [ -z "$PREFLIGHT_SHA" ]; then
              echo "::error::No merge SHA available — neither path provided one."
              exit 1
            fi
            echo "merge_sha=$PREFLIGHT_SHA" >> "$GITHUB_OUTPUT"
            echo "Using recovery-path merge SHA: $PREFLIGHT_SHA"
          fi

      - name: Mint release-bot App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2.1.4
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout merge SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.sha.outputs.merge_sha }}
          token: ${{ steps.app.outputs.token }}

      - name: Run tag-all.sh (idempotent)
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
          MERGE_SHA: ${{ steps.sha.outputs.merge_sha }}
        run: scripts/release/tag-all.sh "$PUBLISH_VERSION" "$MERGE_SHA"

  # =====================================================================
  # Job: goreleaser
  # =====================================================================
  # Builds binaries for the published-CLI matrix, attests build
  # provenance, creates the GitHub Release. Identical semantics to
  # the legacy job; only the inputs (tag, SHA) come from the new
  # tag-all job.
  # =====================================================================
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, tag-all]
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write   # ghcr.io/axonops/audit-gen — #610
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch and checkout release tag
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin tag "$PUBLISH_VERSION" --no-tags
          git checkout "$PUBLISH_VERSION"

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$(git rev-parse HEAD)" origin/main; then
            echo "ERROR: tag must point to a commit on main"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work for inter-module resolution
        run: make workspace

      # Sigstore keyless signing (#516). Installs the cosign binary
      # so the GoReleaser `signs:` stanza can call `cosign sign-blob`
      # against the GHA OIDC token (id-token: write above) for
      # keyless certificate issuance from Fulcio. Pinned to the v4.1.1
      # commit SHA per repository action-pin policy.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Multi-arch OCI image build for ghcr.io/axonops/audit-gen (#610).
      # Buildx + QEMU enable cross-platform builds (amd64 + arm64) on
      # the GitHub-hosted ubuntu runner. The login uses GITHUB_TOKEN
      # against ghcr.io — no separate registry token required because
      # the goreleaser job has packages:write permission above.
      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: 'v2.15.4'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem

  # =====================================================================
  # Job: verify
  # =====================================================================
  # Triggers proxy.golang.org indexing and runs a smoke test
  # (go get + compile + install) against the freshly tagged versions.
  # =====================================================================
  # =====================================================================
  # Job: mutation-test-attach (#524)
  # =====================================================================
  # Downloads the mutation-test report artefact uploaded by the
  # mutation-test-release gate job and attaches it to the published
  # GitHub Release. The release was already gated on a passing
  # mutation-test run; this step makes the report permanently
  # discoverable from the release page.
  # =====================================================================
  mutation-test-attach:
    name: Attach Mutation Report to Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [preflight, goreleaser, mutation-test-release]
    permissions:
      contents: write
    # workflow_dispatch ONLY: matches mutation-test-release gating —
    # the push-tag recovery path does not produce a mutation-test
    # artefact to attach.
    if: github.event_name == 'workflow_dispatch'
    env:
      PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Download mutation-test report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mutation-test-report-release-${{ needs.preflight.outputs.version }}

      - name: Attach report to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$PUBLISH_VERSION" mutation-test-report.txt --clobber --repo "$GITHUB_REPOSITORY"

  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, goreleaser]
    permissions:
      contents: read
    env:
      PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Trigger proxy indexing (best-effort)
        run: |
          set -euo pipefail
          while IFS='|' read -r dir mod prefix; do
            [ -z "$mod" ] && continue
            echo "Requesting $mod@$PUBLISH_VERSION ..."
            if GOPROXY=https://proxy.golang.org go list -m "$mod@$PUBLISH_VERSION" 2>/dev/null; then
              echo "  ✓ indexed"
            else
              echo "  ⚠ not yet indexed (will index on first consumer request)"
            fi
          done < <(make -s --no-print-directory print-publish-modules)

      - name: Smoke test (go get + compile)
        run: |
          set -euo pipefail
          REPO_ROOT="$PWD"
          dir=$(mktemp -d)
          trap 'rm -rf "$dir"' EXIT
          cd "$dir"

          go mod init smoketest
          while IFS='|' read -r src mod prefix; do
            [ -z "$mod" ] && continue
            GOPROXY=direct GONOSUMCHECK=github.com/axonops/audit GONOSUMDB=github.com/axonops/audit go get "$mod@$PUBLISH_VERSION"
          done < <(cd "$REPO_ROOT" && make -s --no-print-directory print-publish-modules)

          cat > main.go << 'GOEOF'
          package main
          import (
            _ "github.com/axonops/audit"
            _ "github.com/axonops/audit/file"
            _ "github.com/axonops/audit/syslog"
            _ "github.com/axonops/audit/webhook"
            _ "github.com/axonops/audit/loki"
            _ "github.com/axonops/audit/outputconfig"
            _ "github.com/axonops/audit/outputs"
            _ "github.com/axonops/audit/secrets"
            _ "github.com/axonops/audit/secrets/openbao"
            _ "github.com/axonops/audit/secrets/vault"
          )
          func main() {}
          GOEOF
          GOPROXY=direct GONOSUMCHECK=github.com/axonops/audit GONOSUMDB=github.com/axonops/audit go build -o /dev/null .

          GOPROXY=direct GONOSUMCHECK=github.com/axonops/audit GONOSUMDB=github.com/axonops/audit go install "github.com/axonops/audit/cmd/audit-gen@$PUBLISH_VERSION"
          GOPROXY=direct GONOSUMCHECK=github.com/axonops/audit GONOSUMDB=github.com/axonops/audit go install "github.com/axonops/audit/cmd/audit-validate@$PUBLISH_VERSION"
          echo "✓ All modules compile and install successfully"

  # =====================================================================
  # Job: invariants
  # =====================================================================
  # Final post-release sanity gate: every published go.mod references
  # the released version. Catches drift introduced if anything raced
  # the release window.
  # =====================================================================
  invariants:
    name: Release Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [preflight, tag-all, verify]
    permissions:
      contents: read
    steps:
      - name: Checkout merge SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.tag-all.outputs.merge_sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: make check-release-invariants
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
        run: make check-release-invariants VERSION="$PUBLISH_VERSION"

  # =====================================================================
  # Job: summary
  # =====================================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs:
      - preflight
      - ci
      - fuzz-long
      - bench-advisory
      - api-check
      - mutation-test-release
      - update-deps-pr
      - wait-for-pr-merge
      - tag-all
      - goreleaser
      - mutation-test-attach
      - verify
      - invariants
    if: always()
    steps:
      - name: Checkout (for make print-publish-modules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate summary
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          {
            echo "## Release: $PUBLISH_VERSION"
            echo
            echo '| Step | Status |'
            echo '|------|--------|'
            echo "| Preflight | ${{ needs.preflight.result }} |"
            echo "| CI Gate | ${{ needs.ci.result }} |"
            echo "| Long Fuzz | ${{ needs.fuzz-long.result }} |"
            echo "| Bench (advisory) | ${{ needs.bench-advisory.result }} |"
            echo "| API Check | ${{ needs.api-check.result }} |"
            echo "| Mutation Test (gate) | ${{ needs.mutation-test-release.result }} |"
            echo "| Open release PR | ${{ needs.update-deps-pr.result }} |"
            echo "| Wait for merge | ${{ needs.wait-for-pr-merge.result }} |"
            echo "| Tag all modules | ${{ needs.tag-all.result }} |"
            echo "| GoReleaser | ${{ needs.goreleaser.result }} |"
            echo "| Mutation Report Attached | ${{ needs.mutation-test-attach.result }} |"
            echo "| Verify | ${{ needs.verify.result }} |"
            echo "| Invariants | ${{ needs.invariants.result }} |"
            echo
            echo '### Modules'
            echo
            echo '| Module | proxy | docs |'
            echo '|--------|-------|------|'
            while IFS='|' read -r dir mod prefix; do
              [ -z "$mod" ] && continue
              proxy_path=$(echo "$mod" | tr '[:upper:]' '[:lower:]')
              proxy="https://proxy.golang.org/${proxy_path}/@v/${PUBLISH_VERSION}.info"
              pkgdev="https://pkg.go.dev/${mod}@${PUBLISH_VERSION}"
              echo "| \`$mod\` | [proxy]($proxy) | [docs]($pkgdev) |"
            done < <(make -s --no-print-directory print-publish-modules)
          } >> "$GITHUB_STEP_SUMMARY"
