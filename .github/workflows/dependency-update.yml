name: Dependency Update

# Nightly job that updates transitive Go dependencies across all modules.
# Dependabot handles direct dependency version bumps but misses transitive
# updates that `go get -u ./...` finds. This workflow fills that gap.
#
# Creates a single PR with all updates. If a PR already exists, it is
# updated in place. Human review is required before merge.
#
# NOTE on CI triggering: PRs created with GITHUB_TOKEN do not trigger
# on.pull_request workflows (GitHub's infinite-loop prevention). This
# workflow runs a smoke test (vet + lint + unit tests + build) inline
# before creating the PR. Full CI (integration, BDD) runs when a
# maintainer closes/reopens the PR or pushes an empty commit.
# To enable automatic full CI triggering, configure a GitHub App and
# set its token as the DEPENDENCY_UPDATE_TOKEN secret.

on:
  schedule:
    # 02:00 UTC daily — chosen to avoid overlap with Dependabot's Monday run
    - cron: '0 2 * * *'
  workflow_dispatch: {}

concurrency:
  group: dependency-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Single setup story: pulls in setup-go, make workspace, the
      # ~/go/bin tool cache (keyed by scripts/tool-versions.txt), and
      # make install-tools. Tools are installed unconditionally up front
      # so the smoke-test path below stays a flat sequence; cache hits
      # make this ~5–10 s on no-change runs (#520).
      - name: Set up audit toolchain
        uses: ./.github/actions/setup-audit
        with:
          install-tools: 'true'

      - name: Save pre-update go.mod files
        run: |
          for mod in . file syslog webhook loki outputconfig outputs cmd/audit-gen cmd/audit-validate secrets secrets/env secrets/file secrets/openbao secrets/vault examples/01-basic examples/02-code-generation examples/03-file-output examples/04-formatters examples/05-standard-fields examples/06-syslog-output examples/07-webhook-output examples/08-loki-output examples/09-multi-output examples/10-event-routing examples/11-sensitivity-labels examples/12-hmac-integrity examples/13-tls-policy examples/14-buffering examples/15-middleware examples/16-health-endpoint examples/17-testing examples/18-migration examples/19-prometheus-reference examples/20-capstone; do
            cp "$mod/go.mod" "$mod/go.mod.before"
          done

      - name: Update dependencies per module
        shell: bash
        run: |
          set -eo pipefail
          MODULES=". file syslog webhook loki outputconfig outputs cmd/audit-gen cmd/audit-validate secrets secrets/env secrets/file secrets/openbao secrets/vault examples/01-basic examples/02-code-generation examples/03-file-output examples/04-formatters examples/05-standard-fields examples/06-syslog-output examples/07-webhook-output examples/08-loki-output examples/09-multi-output examples/10-event-routing examples/11-sensitivity-labels examples/12-hmac-integrity examples/13-tls-policy examples/14-buffering examples/15-middleware examples/16-health-endpoint examples/17-testing examples/18-migration examples/19-prometheus-reference examples/20-capstone"
          CORE_MODULE="github.com/axonops/audit"
          FAILED=""

          for mod in $MODULES; do
            echo ""
            echo "========================================"
            echo "Updating: $mod"
            echo "========================================"

            cd "$mod"

            # Capture the current inter-module versions so we can restore them.
            # Sub-modules pin each other at release versions managed by humans,
            # not by automated updates.
            PINNED_VERSIONS=""
            for dep in \
              "$CORE_MODULE" \
              "$CORE_MODULE/file" \
              "$CORE_MODULE/syslog" \
              "$CORE_MODULE/webhook" \
              "$CORE_MODULE/loki" \
              "$CORE_MODULE/outputconfig" \
              "$CORE_MODULE/outputs" \
              "$CORE_MODULE/cmd/audit-gen" \
              "$CORE_MODULE/cmd/audit-validate" \
              "$CORE_MODULE/secrets" \
              "$CORE_MODULE/secrets/env" \
              "$CORE_MODULE/secrets/file" \
              "$CORE_MODULE/secrets/openbao" \
              "$CORE_MODULE/secrets/vault"; do
              # `grep` returns 1 when the dep is not present in go.mod
              # (legitimate for sub-modules that don't reference every
              # other module); `|| true` absorbs that expected non-zero
              # exit so `set -eo pipefail` catches real failures.
              ver=$(grep "^	$dep " go.mod 2>/dev/null | awk '{print $2}' || true)
              if [ -n "$ver" ]; then
                PINNED_VERSIONS="$PINNED_VERSIONS $dep@$ver"
              fi
            done

            # Update all dependencies. Continue on failure — one module's
            # issue must not block updates to the others.
            if ! go get -u ./... 2>/tmp/goget-error-$$.txt; then
              echo "WARNING: go get -u failed for module $mod"
              cat /tmp/goget-error-$$.txt
              FAILED="$FAILED $mod"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            # Restore pinned inter-module versions. These are managed at
            # release time, not by nightly updates.
            if [ -n "$PINNED_VERSIONS" ]; then
              echo "Restoring inter-module pins:$PINNED_VERSIONS"
              # shellcheck disable=SC2086
              go get $PINNED_VERSIONS
            fi

            # Tidy to remove any unused entries.
            if ! go mod tidy 2>/tmp/tidy-error-$$.txt; then
              echo "WARNING: go mod tidy failed for module $mod"
              cat /tmp/tidy-error-$$.txt
              FAILED="$FAILED $mod"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            echo "OK: $mod updated successfully"
            cd "$GITHUB_WORKSPACE"
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "WARNING: The following modules had errors:$FAILED"
            echo "Other modules were updated successfully."
          fi

      - name: Check for changes
        id: changes
        run: |
          MODULES=". file syslog webhook loki outputconfig outputs cmd/audit-gen cmd/audit-validate secrets secrets/env secrets/file secrets/openbao secrets/vault examples/01-basic examples/02-code-generation examples/03-file-output examples/04-formatters examples/05-standard-fields examples/06-syslog-output examples/07-webhook-output examples/08-loki-output examples/09-multi-output examples/10-event-routing examples/11-sensitivity-labels examples/12-hmac-integrity examples/13-tls-policy examples/14-buffering examples/15-middleware examples/16-health-endpoint examples/17-testing examples/18-migration examples/19-prometheus-reference examples/20-capstone"
          HAS_CHANGES="false"

          for mod in $MODULES; do
            if [ -f "$mod/go.mod.before" ]; then
              if ! diff -q "$mod/go.mod.before" "$mod/go.mod" > /dev/null 2>&1; then
                HAS_CHANGES="true"
                break
              fi
            fi
          done

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

      # --- Smoke test: verify updated deps do not break the build ---
      # Runs vet, lint, unit tests, and cross-build on the updated tree.
      # Full integration/BDD tests run when CI triggers on the PR.
      # (Toolchain is set up unconditionally above by setup-audit.)

      - name: Smoke test — vet
        if: steps.changes.outputs.has_changes == 'true'
        run: make vet-all

      - name: Smoke test — lint
        if: steps.changes.outputs.has_changes == 'true'
        run: make lint-all

      - name: Smoke test — unit tests
        if: steps.changes.outputs.has_changes == 'true'
        run: make test-all

      - name: Smoke test — cross-platform build
        if: steps.changes.outputs.has_changes == 'true'
        run: make build-all

      - name: Smoke test — govulncheck
        if: steps.changes.outputs.has_changes == 'true'
        run: make security

      # --- Generate PR description from go.mod diffs ---

      - name: Generate update summary
        id: summary
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -eo pipefail
          MODULES=". file syslog webhook loki outputconfig outputs cmd/audit-gen cmd/audit-validate secrets secrets/env secrets/file secrets/openbao secrets/vault examples/01-basic examples/02-code-generation examples/03-file-output examples/04-formatters examples/05-standard-fields examples/06-syslog-output examples/07-webhook-output examples/08-loki-output examples/09-multi-output examples/10-event-routing examples/11-sensitivity-labels examples/12-hmac-integrity examples/13-tls-policy examples/14-buffering examples/15-middleware examples/16-health-endpoint examples/17-testing examples/18-migration examples/19-prometheus-reference examples/20-capstone"
          BODY=""

          for mod in $MODULES; do
            if [ ! -f "$mod/go.mod.before" ]; then
              continue
            fi

            if diff -q "$mod/go.mod.before" "$mod/go.mod" > /dev/null 2>&1; then
              continue
            fi

            MODULE_NAME="$mod"
            if [ "$mod" = "." ]; then
              MODULE_NAME="core"
            fi

            BODY="$BODY### Module: \`$MODULE_NAME\`\n\n"
            # `diff -u` returns 1 when files differ (the expected case
            # triggering this block); `|| true` absorbs that so
            # pipefail catches only genuine failures (missing file,
            # permission error).
            DIFF_OUTPUT=$(diff -u "$mod/go.mod.before" "$mod/go.mod" | tail -n +3 || true)
            BODY="$BODY\`\`\`diff\n${DIFF_OUTPUT}\n\`\`\`\n\n"
          done

          # Clean up .before files — they must not be committed.
          for mod in $MODULES; do
            rm -f "$mod/go.mod.before"
          done

          # Write body to a file to avoid shell quoting issues.
          {
            echo "## Dependency Updates"
            echo ""
            echo "Nightly \`go get -u ./...\` found transitive dependency updates"
            echo "that Dependabot does not cover."
            echo ""
            echo -e "$BODY"
            echo "### Smoke test results"
            echo ""
            echo "The following passed in this workflow run before the PR was created:"
            echo "- \`make vet-all\`"
            echo "- \`make lint-all\`"
            echo "- \`make test-all\` (unit tests with \`-race\`)"
            echo "- \`make build-all\` (linux/amd64, darwin/arm64, windows/amd64)"
            echo "- \`make security\` (govulncheck)"
            echo ""
            echo "---"
            echo ""
            echo "**Review checklist:**"
            echo "- [ ] Review the dependency diffs above for unexpected major version bumps"
            echo "- [ ] Close and reopen the PR to trigger full CI (integration + BDD tests)"
            echo "- [ ] Verify inter-module \`github.com/axonops/audit\` versions are unchanged"
            echo ""
            echo "*This PR was created automatically by the [nightly dependency update workflow](https://github.com/${{ github.repository }}/actions/workflows/dependency-update.yml).*"
          } > /tmp/pr-body.md

      # --- Commit dep-update on long-lived branch ---
      #
      # Replaces peter-evans/create-pull-request, which always
      # force-pushes. Force-push detaches reviewer line-comments from
      # their commit SHAs (GitHub marks them "outdated"), which
      # operators experience as "comments disappeared between runs"
      # (#521). Append-only commits on a long-lived branch keep
      # comments anchored to their original commits.

      - name: Commit dep update on long-lived branch
        id: commit
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -eo pipefail
          BRANCH=chore/nightly-dep-update
          SAVE=/tmp/depupdate-save
          rm -rf "$SAVE" && mkdir -p "$SAVE"

          MODULES=". file syslog webhook loki outputconfig outputs cmd/audit-gen cmd/audit-validate secrets secrets/env secrets/file secrets/openbao secrets/vault examples/01-basic examples/02-code-generation examples/03-file-output examples/04-formatters examples/05-standard-fields examples/06-syslog-output examples/07-webhook-output examples/08-loki-output examples/09-multi-output examples/10-event-routing examples/11-sensitivity-labels examples/12-hmac-integrity examples/13-tls-policy examples/14-buffering examples/15-middleware examples/16-health-endpoint examples/17-testing examples/18-migration examples/19-prometheus-reference examples/20-capstone"

          # Snapshot only go.mod / go.sum from each module — those are
          # the only files the dep-update step modifies.
          for mod in $MODULES; do
            mkdir -p "$SAVE/$mod"
            cp "$mod/go.mod" "$SAVE/$mod/go.mod"
            [ -f "$mod/go.sum" ] && cp "$mod/go.sum" "$SAVE/$mod/go.sum" || true
          done

          # Reset the working tree so we can switch branches cleanly.
          git reset --hard HEAD
          git clean -fd

          # Check out target branch — existing on origin if it exists,
          # otherwise a new branch from current HEAD (main).
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            echo "Checked out existing branch $BRANCH"
          else
            git checkout -b "$BRANCH"
            echo "Created new branch $BRANCH"
          fi

          # Reapply the snapshotted files on top of the target branch.
          for mod in $MODULES; do
            cp "$SAVE/$mod/go.mod" "$mod/go.mod"
            [ -f "$SAVE/$mod/go.sum" ] && cp "$SAVE/$mod/go.sum" "$mod/go.sum" || true
          done

          # If the branch already has these exact deps, there is nothing
          # to push (rare but possible — upstream unchanged since last
          # successful run).
          if [ -z "$(git status --porcelain)" ]; then
            echo "No new dep changes vs existing branch — nothing to push"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only go.mod and go.sum across all modules. Avoids
          # accidentally committing other tree noise.
          for mod in $MODULES; do
            git add "$mod/go.mod"
            [ -f "$mod/go.sum" ] && git add "$mod/go.sum" || true
          done

          git commit -m "chore(deps): nightly transitive dependency update ($(date -u +%Y-%m-%d))"
          git push origin "$BRANCH"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true' && steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -eo pipefail
          BRANCH=chore/nightly-dep-update
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body-file /tmp/pr-body.md
            echo "Updated existing PR #$EXISTING in place — review comments preserved"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "chore(deps): nightly transitive dependency update" \
              --body-file /tmp/pr-body.md \
              --label dependencies
          fi
